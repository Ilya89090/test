name: Test and Sync to Main

on:
  push:
    branches: [source]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  sync:
    needs: test
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Remove solution file
        run: rm -f task/solution.js

      - name: Push to main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b temp-main
          git add .
          git commit -m "sync from source (no solution)"
          git push origin temp-main:main --force
